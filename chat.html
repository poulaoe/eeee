<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💬 Chat - QCM Quiz</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0f1729 0%, #1a2a4a 100%);
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      color: #e6f0ff;
      min-height: 100vh;
      padding: 16px;
    }

    .chat-container {
      max-width: 900px;
      margin: 0 auto;
      background: linear-gradient(180deg, #0f3460 0%, #0d2847 100%);
      border: 1px solid #29507a;
      border-radius: 14px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      height: calc(100vh - 32px);
      max-height: 800px;
    }

    .chat-header {
      padding: 16px;
      border-bottom: 1px solid #29507a;
      background: linear-gradient(180deg, #1a4d7a 0%, #0f3460 100%);
      border-radius: 14px 14px 0 0;
    }

    .chat-header h1 {
      font-size: 1.2rem;
      margin-bottom: 8px;
      color: #a8d8ff;
    }

    .chat-stats {
      display: flex;
      gap: 20px;
      font-size: 0.8rem;
      color: #7fa8c8;
    }

    .chat-stats-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-badge {
      background: rgba(255, 107, 107, 0.2);
      color: #ff6b6b;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 700;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chat-message {
      background: rgba(255, 255, 255, 0.06);
      border-left: 3px solid #27ae60;
      border-radius: 8px;
      padding: 12px;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .chat-message.own {
      border-left-color: #3498db;
      background: rgba(52, 152, 219, 0.1);
      margin-left: 30px;
    }

    .chat-message-meta {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 0.75rem;
      color: #7fa8c8;
    }

    .chat-message-user {
      font-weight: 700;
      color: #a8d8ff;
    }

    .chat-message-time {
      color: #5a7a98;
    }

    .chat-message-text {
      color: #d4e4f7;
      font-size: 0.9rem;
      word-wrap: break-word;
    }

    .chat-empty {
      text-align: center;
      color: #5a7a98;
      padding: 40px 16px;
      font-size: 0.9rem;
    }

    .chat-input-zone {
      padding: 16px;
      border-top: 1px solid #29507a;
      background: linear-gradient(180deg, #0c2847 0%, #0f3460 100%);
      border-radius: 0 0 14px 14px;
    }

    .chat-input-wrapper {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .chat-input-wrapper textarea {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #29507a;
      border-radius: 8px;
      background: #0a1e38;
      color: #ecf4ff;
      font-family: inherit;
      font-size: 0.9rem;
      resize: vertical;
      min-height: 40px;
      max-height: 100px;
      outline: none;
    }

    .chat-input-wrapper textarea:focus {
      border-color: #3498db;
      box-shadow: 0 0 8px rgba(52, 152, 219, 0.3);
    }

    .chat-send-btn {
      padding: 10px 16px;
      background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.3s;
    }

    .chat-send-btn:hover {
      filter: brightness(1.1);
      transform: translateY(-2px);
    }

    .chat-send-btn:active {
      transform: translateY(0);
    }

    .subject-selector {
      margin-bottom: 12px;
    }

    .subject-selector select {
      width: 100%;
      padding: 8px;
      border: 1px solid #29507a;
      border-radius: 8px;
      background: #0a1e38;
      color: #ecf4ff;
      font-weight: 700;
    }

    .loading-indicator {
      text-align: center;
      padding: 20px;
      color: #7fa8c8;
      font-size: 0.85rem;
    }

    .error-zone {
      background: rgba(231, 76, 60, 0.1);
      border: 1px solid #e74c3c;
      border-radius: 8px;
      padding: 12px;
      color: #ff9999;
      margin-bottom: 12px;
      font-size: 0.85rem;
    }

    .user-badge {
      display: inline-block;
      background: rgba(52, 152, 219, 0.2);
      color: #6bb6ff;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      margin-right: 4px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    @media (max-width: 600px) {
      .chat-container {
        height: calc(100vh - 32px);
        max-height: none;
      }
      
      .chat-message.own {
        margin-left: 0;
      }

      .chat-stats {
        flex-direction: column;
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <h1 style="margin:0">💬 Chat public QCM</h1>
      <div style="display:flex;gap:8px">
        <button onclick="window.history.length>1?history.back():window.location.href='index.html'" style="padding:6px 12px;border:1px solid rgba(255,255,255,.35);background:rgba(0,0,0,.22);color:#fff;border-radius:8px;cursor:pointer;font-size:.8rem;font-weight:700">← Retour</button>
        <button onclick="window.location.href='index.html'" style="padding:6px 12px;border:1px solid rgba(255,255,255,.35);background:rgba(0,0,0,.22);color:#fff;border-radius:8px;cursor:pointer;font-size:.8rem;font-weight:700">🏠 Accueil</button>
      </div>
    </div>
      <div class="chat-stats">
        <div class="chat-stats-item">
          <span>Messages:</span>
          <span class="stat-badge" id="message-count">0</span>
        </div>
        <div class="chat-stats-item">
          <span>Utilisateurs uniques:</span>
          <span class="stat-badge" id="user-count">0</span>
        </div>
        <div class="chat-stats-item">
          <span>Auto-refresh:</span>
          <span id="refresh-status">✓ Actif</span>
        <span id="new-msg-badge" style="display:none;background:#e74c3c;color:#fff;padding:2px 8px;border-radius:12px;font-weight:700;font-size:.75rem;animation:pulse 1s infinite">🔔 <span id="new-msg-count">0</span> nouveau(x)</span>
        </div>
      </div>
    </div>

    <div class="chat-messages" id="chat-messages">
      <div class="chat-empty">⏳ Chargement des messages...</div>
    </div>

    <div class="chat-input-zone">
      <div id="error-zone"></div>
      <div class="subject-selector">
        <label>Mati\u00e8re :</label>
        <select id="chat-subject">
          <option value="General">💬 Général</option>
          <option value="Pathologie">🏥 Pathologie</option>
          <option value="Douleur">😣 Douleur</option>
          <option value="Anat">🦴 Anatomie</option>
          <option value="Proced">🔬 Procédures</option>
        </select>
      </div>
      <div class="chat-input-wrapper">
        <textarea id="chat-input" placeholder="Écris ton message... (max 2000 caractères)" maxlength="2000"></textarea>
        <button class="chat-send-btn" id="chat-send-btn" onclick="sendChatMessage()">Envoyer</button>
      </div>
    </div>
  </div>

  <script src="remote-config.js"></script>
  <script src="remote-sync.js"></script>
  <script>
    let currentUser = localStorage.getItem('qcm_signed_user') || 'Invité-' + Math.random().toString(36).substr(2, 5);
    let allMessages = [];
    let refreshInterval = null;

    function formatTime(timestamp) {
      try {
        const date = new Date(timestamp);
        return date.toLocaleString('fr-FR', {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          day: '2-digit',
          month: '2-digit'
        });
      } catch (e) {
        return timestamp || 'N/A';
      }
    }

    function getUniqueUsers() {
      const users = new Set(allMessages.map(m => m.user));
      return users.size;
    }

    function updateNotificationBadge(count) {
      // Favicon avec bulle
      if (count > 0) {
        document.title = '(' + count + ') 💬 Chat - QCM Quiz';
      } else {
        document.title = '💬 Chat - QCM Quiz';
      }
      // Bulle sur le bouton refresh
      const badge = document.getElementById('new-msg-badge');
      if (badge) {
        badge.textContent = count > 0 ? count : '';
        badge.style.display = count > 0 ? 'inline-block' : 'none';
      }
    }

    function renderChatMessages() {
      const container = document.getElementById('chat-messages');
      const messageCount = document.getElementById('message-count');
      const userCount = document.getElementById('user-count');

      messageCount.textContent = allMessages.length;
      userCount.textContent = getUniqueUsers();

      if (allMessages.length === 0) {
        container.innerHTML = '<div class="chat-empty">Aucun message pour le moment. Sois le premier à écrire ! 📝</div>';
        return;
      }

      container.innerHTML = allMessages.map((msg, idx) => {
        const isOwn = msg.user === currentUser;
        return `
          <div class="chat-message ${isOwn ? 'own' : ''}">
            <div class="chat-message-meta">
              <span class="chat-message-user">
                ${isOwn ? '👤 Toi' : '<span class="user-badge">' + escapeHtml(msg.user) + '</span>'}
              </span>
              <span class="chat-message-time">${formatTime(msg.created_at)}</span>
            </div>
            <div class="chat-message-text">${escapeHtml(msg.message)}</div>
          </div>
        `;
      }).join('');

      // Auto-scroll vers le bas
      container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      };
      return String(text || '').replace(/[&<>"']/g, m => map[m]);
    }

    async function loadMessages() {
      try {
        const subject = document.getElementById('chat-subject').value || 'General';
        if (!window.QCM_REMOTE || typeof window.QCM_REMOTE.fetchChatMessages !== 'function') {
          throw new Error('Supabase non configuré');
        }

        const messages = await window.QCM_REMOTE.fetchChatMessages(subject, 100);
        const newCount = Math.max(0, (messages || []).length - allMessages.length);
        allMessages = messages || [];
        document.getElementById('error-zone').innerHTML = '';
        renderChatMessages();
        if (newCount > 0 && document.hidden) {
          updateNotificationBadge(newCount);
        } else {
          updateNotificationBadge(0);
        }
      } catch (error) {
        console.error('Erreur chargement:', error);
        const errorZone = document.getElementById('error-zone');
        errorZone.innerHTML = `<div class="error-zone">⚠️ Erreur: ${error.message}</div>`;
      }
    }

    async function sendChatMessage() {
      const input = document.getElementById('chat-input');
      const subject = document.getElementById('chat-subject').value || 'General';
      const text = input.value.trim();

      if (!text) {
        alert('Écris un message !');
        return;
      }

      if (!window.QCM_REMOTE || typeof window.QCM_REMOTE.pushChatMessage !== 'function') {
        alert('Supabase non configuré');
        return;
      }

      try {
        const btn = document.getElementById('chat-send-btn');
        btn.disabled = true;
        btn.textContent = 'Envoi...';

        await window.QCM_REMOTE.pushChatMessage({
          user: currentUser,
          subject: subject,
          message: text
        });

        input.value = '';
        document.getElementById('error-zone').innerHTML = '';
        await loadMessages();
      } catch (error) {
        console.error('Erreur envoi:', error);
        const errorZone = document.getElementById('error-zone');
        errorZone.innerHTML = `<div class="error-zone">⚠️ Envoi impossible: ${error.message}</div>`;
      } finally {
        const btn = document.getElementById('chat-send-btn');
        btn.disabled = false;
        btn.textContent = 'Envoyer';
      }
    }

    document.getElementById('chat-subject').addEventListener('change', loadMessages);

    document.getElementById('chat-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendChatMessage();
      }
    });

    // Auto-refresh
    loadMessages();
    refreshInterval = setInterval(loadMessages, 5000);

    // Cleanup
    window.addEventListener('beforeunload', () => {
      if (refreshInterval) clearInterval(refreshInterval);
    });
  </script>
</body>
</html>
