<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procédure — Bac à sable</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#1a1a2e;color:#e8e8f0;min-height:100vh}
#header{background:linear-gradient(135deg,#c0392b,#922b21);padding:14px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.5)}
#header h1{font-size:.9rem;font-weight:700;letter-spacing:.5px;line-height:1.3}
#progress-bar{background:#16213e;height:4px}
#progress-fill{height:4px;background:linear-gradient(90deg,#c0392b,#e74c3c);transition:width .3s}
#nav-pills{background:#16213e;padding:10px 18px;display:flex;flex-wrap:wrap;gap:5px;border-bottom:1px solid #2d2d50}
.pill{width:30px;height:30px;border-radius:50%;border:2px solid #2d2d50;background:transparent;color:#aaa;cursor:pointer;font-size:.7rem;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .2s}
.pill:hover{border-color:#c0392b;color:#fff}
.pill.answered{background:#27ae60;border-color:#27ae60;color:#fff}
.pill.current{border-color:#e74c3c;color:#e74c3c;transform:scale(1.15)}
.pill.answered.current{background:#c0392b;border-color:#c0392b;color:#fff}
#main{max-width:820px;margin:0 auto;padding:18px}
.qcard{display:none;background:#16213e;border-radius:12px;padding:22px;margin-bottom:14px;border:1px solid #2d2d50}
.qcard.active{display:block;animation:fadein .25s ease}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.qtag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.68rem;font-weight:800;letter-spacing:1px;margin-bottom:8px}
.tag-fausse{background:rgba(192,57,43,.25);color:#e74c3c;border:1px solid rgba(192,57,43,.4)}
.tag-vraie{background:rgba(39,174,96,.2);color:#2ecc71;border:1px solid rgba(39,174,96,.4)}
.tag-direct{background:rgba(52,152,219,.2);color:#3498db;border:1px solid rgba(52,152,219,.4)}
.chapitre-tag{font-size:.62rem;color:#666;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.qtext{font-size:.97rem;line-height:1.6;font-weight:500;margin-bottom:18px;color:#dde}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{background:#0f3460;border:2px solid #2d2d50;border-radius:8px;padding:11px 15px;cursor:pointer;font-size:.88rem;color:#ccd;transition:all .2s;text-align:left}
.opt:hover{border-color:#c0392b;background:#1a1a2e;color:#fff}
.opt.selected{border-color:#3498db;background:rgba(52,152,219,.15);color:#fff}
.qnav{display:flex;justify-content:space-between;align-items:center;margin-top:18px;gap:8px}
.btn{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-size:.83rem;font-weight:700;transition:all .2s}
.btn-prev{background:#2d2d50;color:#aaa}.btn-prev:hover{background:#3d3d70;color:#fff}
.btn-prev:disabled{opacity:.3;cursor:default}
.btn-skip{background:transparent;border:2px solid #555;color:#999}.btn-skip:hover{border-color:#aaa;color:#ccc}
.btn-next{background:#c0392b;color:#fff}.btn-next:hover{background:#e74c3c}
.btn-submit{background:linear-gradient(135deg,#27ae60,#2ecc71);color:#fff;padding:12px 30px;font-size:.95rem}
#submit-zone{text-align:center;padding:22px;background:#16213e;border-radius:12px;border:1px solid #2d2d50;margin-top:6px}
#submit-zone p{color:#aaa;margin-bottom:14px;font-size:.88rem}
#home{max-width:600px;margin:40px auto;padding:24px;text-align:center}
.home-card{background:#16213e;border-radius:16px;padding:32px;border:1px solid #2d2d50}
.home-card h2{color:#e74c3c;font-size:1.4rem;margin-bottom:12px}
.home-card p{color:#aaa;font-size:.9rem;line-height:1.6;margin-bottom:20px}
.home-actions{display:flex;justify-content:flex-end;gap:8px;margin-bottom:12px}
.home-btn{padding:7px 10px;border:1px solid rgba(255,255,255,.35);background:rgba(0,0,0,.22);color:#fff;border-radius:9px;cursor:pointer;font-size:.8rem;font-weight:700}
.home-btn:hover{background:rgba(0,0,0,.35)}
.stat-grid{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:24px}
.stat{background:#0f3460;border-radius:8px;padding:10px 16px;font-size:.82rem;color:#aac}
.stat span{display:block;font-size:1.4rem;font-weight:800;color:#e74c3c}
.btn-start{background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff;padding:14px 36px;border-radius:10px;border:none;cursor:pointer;font-size:1rem;font-weight:800;letter-spacing:.5px}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(192,57,43,.4)}
.corr-item{background:#16213e;border-radius:10px;padding:14px 18px;margin-bottom:9px;border-left:4px solid #27ae60}
.corr-item.wrong{border-left-color:#e74c3c}.corr-item.skipped{border-left-color:#f39c12}
.corr-q{font-size:.81rem;font-weight:600;margin-bottom:5px;color:#dde}
.corr-ans{font-size:.8rem;margin-bottom:3px}
.corr-ok{color:#2ecc71;font-weight:400}.corr-ko{color:#e74c3c;font-weight:400}
.corr-expl{font-size:.74rem;color:#99a;line-height:1.5;margin-top:5px;padding-top:5px;border-top:1px solid #2d2d50}
#qc-section{background:#16213e;border-radius:12px;padding:22px;margin-top:6px;border:1px solid #2d2d50}
#qc-section h2{color:#e74c3c;margin-bottom:14px;font-size:.95rem}
.qc-item{margin-bottom:16px}
.qc-q{font-weight:600;margin-bottom:5px;font-size:.86rem;color:#dde}
.qc-r{background:#0f3460;border-radius:6px;padding:10px;font-size:.79rem;color:#aac;line-height:1.5;display:none}
.show-r-btn{margin-top:5px;background:transparent;border:1px solid #3498db;color:#3498db;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:.73rem}
.restart-btn{background:#c0392b;color:#fff;padding:12px 28px;border-radius:8px;border:none;cursor:pointer;font-size:.88rem;font-weight:700;margin-top:14px}
.ch-badge{display:inline-block;background:rgba(192,57,43,.15);color:#e74c3c;border-radius:4px;padding:2px 7px;font-size:.68rem;font-weight:700;margin-bottom:6px}
</style>
</head>
<body>
<div id="home">
  <div class="home-card">
    <div class="home-actions">
      <button class="home-btn" type="button" onclick="history.back()">Retour</button>
      <button class="home-btn" type="button" onclick="window.location.href='index.html'">Menu</button>
    </div>
    <div style="font-size:2.5rem;margin-bottom:8px">📋</div>
    <h2 id="home-title">Bac à sable Procédure</h2>
    <p id="home-desc">Mode bac à sable Procédure. Ajoute ici les questions de procédure dans la variable BANK.</p>
    <div class="stat-grid">
      <div class="stat"><span id="sc1">0</span>Chapitres</div>
      <div class="stat"><span id="question-count">25</span>QCM / partiel</div>
      <div class="stat"><span>∞</span>Temps</div>
      <div class="stat"><span>∞</span>Partiels possibles</div>
    </div>
    <div id="sandbox-options" class="home-options" style="text-align:left;margin-top:18px;margin-bottom:18px;display:none">
      <div style="margin-bottom:14px">
        <label for="exam-size" style="display:block;margin-bottom:8px;font-weight:700;color:#fff">Nombre de QCM</label>
        <select id="exam-size" style="width:100%;padding:10px;border-radius:10px;border:1px solid #2d2d50;background:#0f3460;color:#fff">
          <option value="10">10 QCM</option>
          <option value="15">15 QCM</option>
          <option value="20">20 QCM</option>
          <option value="25" selected>25 QCM</option>
        </select>
      </div>
      <div style="margin-bottom:14px">
        <label for="chapter-filter" style="display:block;margin-bottom:8px;font-weight:700;color:#fff">Chapitres (plusieurs possibles)</label>
        <select id="chapter-filter" multiple style="width:100%;padding:10px;border-radius:10px;border:1px solid #2d2d50;background:#0f3460;color:#fff;min-height:120px"></select>
      </div>
      <div id="message-zone" style="color:#aaa;font-size:.88rem;line-height:1.5">Chargement...</div>
    </div>
    <div id="common-options" style="text-align:left;margin-top:18px;margin-bottom:18px">
      <div style="margin-bottom:14px">
        <label style="color:#ccc;font-size:.86rem">⏱ Options :</label>
        <label style="color:#ccc;font-size:.86rem"><input id="enable-timer" type="checkbox"> Minuterie</label>
        <label style="color:#ccc;font-size:.86rem">Durée (min): <input id="timer-minutes" type="number" min="1" value="30" style="width:68px;margin-left:6px;padding:4px;border-radius:6px;background:#0f3460;color:#fff;border:1px solid #2d2d50"></label>
        <label style="color:#ccc;font-size:.86rem">Barème: <select id="grading-scheme" style="margin-left:6px;padding:4px;border-radius:6px;background:#0f3460;color:#fff;border:1px solid #2d2d50"><option value="classic">Bac (+0.25 / −0.083)</option><option value="simple">Simple (+1 / 0)</option><option value="custom">Personnalisé</option></select></label>
        <div id="custom-grading-fields" style="display:none;margin-top:8px;color:#ccc;font-size:.86rem">
          <label style="display:block;margin-bottom:6px">Notation personnalisée :</label>
          <label style="display:block;margin-bottom:4px">Points bonne réponse : <input id="custom-correct" type="number" min="0" step="0.05" value="0.25" style="width:80px;margin-left:6px;padding:4px;border-radius:6px;background:#0f3460;color:#fff;border:1px solid #2d2d50"></label>
          <label style="display:block">Pénalité mauvaise réponse : <input id="custom-wrong" type="number" min="0" step="0.01" value="0.08" style="width:80px;margin-left:6px;padding:4px;border-radius:6px;background:#0f3460;color:#fff;border:1px solid #2d2d50"></label>
        </div>
      </div>
    <button class="btn-start" onclick="startExam()">🚀 Lancer</button>
      </div>
    </div>
  </div>
<div id="header" style="display:none">
  <h1>📋 PARTIEL BLANC — Procédure</h1>
</div>
<div id="progress-bar" style="display:none"><div id="progress-fill" style="width:0%"></div></div>
<div id="nav-pills" style="display:none"></div>
<div id="main" style="display:none">
  <div id="questions-zone"></div>
  <div id="submit-zone" style="display:none">
    <p>Répondues : <span id="answered-count">0</span>/25 — Questions non répondues = 0 point</p>
    <button class="btn btn-submit" onclick="submitExam()">✅ Terminer l'examen</button>
  </div>
</div>
<div id="results"></div>
<script>
window.SUBJECT_NAME = 'Procédure';
window.SUBJECT_DESC = 'Mode bac à sable Procédure. Ajoute ici les questions de procédure dans la variable BANK.';
window.BANK = window.BANK || [];
window.QC_BANK = window.QC_BANK || [];
</script>
<script src="remote-config.js"></script>
<script src="remote-sync.js"></script>
<script src="sandbox.js"></script>
</body>
</html>
